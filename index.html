<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f8fa" />
  <title>Apter Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============ HOME (To Do-style list of lists) ============ -->
  <section id="home" class="view">
    <header class="home-head">
      <img id="avatar" class="avatar" alt="" hidden />
      <div class="home-id">
        <div id="userName" class="user-name">Apter Board</div>
      </div>
      <button id="searchBtn" class="icon-btn" title="Search" aria-label="Search">&#128269;</button>
      <button id="homeSettingsBtn" class="icon-btn" title="Settings" aria-label="Settings">&#9881;</button>
    </header>

    <nav id="smartNav" class="nav-list" aria-label="Smart lists"></nav>

    <div class="nav-heading">Categories</div>
    <nav id="catNav" class="nav-list" aria-label="Categories"></nav>

    <div class="nav-heading">Agents</div>
    <nav id="agentNav" class="nav-list" aria-label="Agents"></nav>

    <p id="homeStatus" class="status"></p>
  </section>

  <!-- ============ LIST DETAIL (tasks) ============ -->
  <section id="detail" class="view" hidden>
    <header class="topbar">
      <button id="backBtn" class="icon-btn" title="Back" aria-label="Back">&#8592;</button>
      <h1 id="listTitle">List</h1>
      <button id="refreshBtn" class="icon-btn" title="Refresh" aria-label="Refresh">&#x21bb;</button>
    </header>

    <input id="searchInput" class="search-input" type="search" placeholder="Search tasks…" hidden />

    <main>
      <ul id="list" class="list" aria-live="polite"></ul>

      <section id="completedGroup" class="completed-group" hidden>
        <button id="completedToggle" class="completed-toggle" aria-expanded="false">
          <span id="completedToggleLabel">&#10003; Completed</span>
          <span class="chev">&#9656;</span>
        </button>
        <ul id="completedList" class="list" hidden></ul>
      </section>

      <p id="empty" class="empty" hidden>Nothing here. &#127881;</p>
      <p id="status" class="status"></p>
    </main>
  </section>

  <!-- ============ Settings / token (shared) ============ -->
  <div id="settings" class="modal" hidden>
    <div class="modal-card">
      <h2>Settings</h2>
      <label for="tokenInput">GitHub token</label>
      <p class="hint">
        Classic PAT with <code>repo</code> + <code>project</code> scopes
        (fine-grained tokens can't write personal projects). Stored only in this
        browser's localStorage — never sent anywhere but GitHub.
      </p>
      <input id="tokenInput" type="password" autocomplete="off" spellcheck="false"
             placeholder="ghp_…" />
      <div class="modal-actions">
        <button id="clearTokenBtn" class="btn btn-ghost">Clear</button>
        <button id="saveTokenBtn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
