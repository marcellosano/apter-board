<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f8fa" />
  <title>Apter Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Apter Board</h1>
    <div class="topbar-actions">
      <button id="refreshBtn" class="icon-btn" title="Refresh" aria-label="Refresh">&#x21bb;</button>
      <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">&#9881;</button>
    </div>
  </header>

  <nav id="filters" class="filters" aria-label="Filters">
    <button class="chip is-active" data-filter="all">All</button>
    <button class="chip" data-filter="focus">My focus</button>
    <button class="chip" data-filter="priority">Priority</button>
    <button class="chip" data-filter="duesoon">Due soon</button>
  </nav>

  <main id="app">
    <ul id="list" class="list" aria-live="polite"></ul>
    <p id="empty" class="empty" hidden>Nothing here. 🎉</p>
    <p id="status" class="status"></p>
  </main>

  <!-- Settings / token panel -->
  <div id="settings" class="modal" hidden>
    <div class="modal-card">
      <h2>Settings</h2>
      <label for="tokenInput">GitHub token</label>
      <p class="hint">
        Fine-grained PAT (repo <code>Apter</code>: Issues R/W, Projects R/W) or a
        classic PAT with <code>repo</code> + <code>project</code>. Stored only in this
        browser's localStorage — never sent anywhere but GitHub.
      </p>
      <input id="tokenInput" type="password" autocomplete="off" spellcheck="false"
             placeholder="github_pat_… or ghp_…" />
      <div class="modal-actions">
        <button id="clearTokenBtn" class="btn btn-ghost">Clear</button>
        <button id="saveTokenBtn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
