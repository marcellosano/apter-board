<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f8fa" />
  <title>Apter Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Apter Board</h1>
    <div class="topbar-actions">
      <button id="refreshBtn" class="icon-btn" title="Refresh" aria-label="Refresh">&#x21bb;</button>
      <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">&#9881;</button>
    </div>
  </header>

  <!-- Smart lists (To Do style) -->
  <nav id="smartlists" class="filters" aria-label="Lists">
    <button class="chip is-active" data-list="myday">&#9728; My Day</button>
    <button class="chip" data-list="today">Today</button>
    <button class="chip" data-list="planned">Planned</button>
    <button class="chip" data-list="all">All</button>
    <button class="chip" data-list="priority">Priority</button>
    <button class="chip" data-list="focus">My focus</button>
    <button class="chip" data-list="completed">&#10003; Completed</button>
  </nav>

  <!-- Agent filter -->
  <nav id="agentbar" class="agentbar" aria-label="Filter by agent"></nav>

  <main id="app">
    <ul id="list" class="list" aria-live="polite"></ul>

    <section id="completedGroup" class="completed-group" hidden>
      <button id="completedToggle" class="completed-toggle" aria-expanded="false">
        <span id="completedToggleLabel">&#10003; Completed</span>
        <span class="chev">&#9656;</span>
      </button>
      <ul id="completedList" class="list" hidden></ul>
    </section>

    <p id="empty" class="empty" hidden>Nothing here. &#127881;</p>
    <p id="status" class="status"></p>
  </main>

  <!-- Settings / token panel -->
  <div id="settings" class="modal" hidden>
    <div class="modal-card">
      <h2>Settings</h2>
      <label for="tokenInput">GitHub token</label>
      <p class="hint">
        Classic PAT with <code>repo</code> + <code>project</code> scopes
        (fine-grained tokens can't write personal projects). Stored only in this
        browser's localStorage — never sent anywhere but GitHub.
      </p>
      <input id="tokenInput" type="password" autocomplete="off" spellcheck="false"
             placeholder="ghp_…" />
      <div class="modal-actions">
        <button id="clearTokenBtn" class="btn btn-ghost">Clear</button>
        <button id="saveTokenBtn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
